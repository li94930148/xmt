# XMT 新媒体协作管理系统 - Docker Compose 配置

version: '3.8'

services:
  xmt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xmt-app
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      # 持久化数据库
      - xmt-data:/app/data
      # 持久化备份
      - xmt-backups:/app/backups
      # HTTPS 证书（可选）
      - ./certs:/app/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  xmt-data:
    driver: local
  xmt-backups:
    driver: local
